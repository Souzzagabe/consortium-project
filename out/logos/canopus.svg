<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Light grey grid background -->
  <rect width="400" height="400" fill="#EAECF0"/>
  <!-- Grid dots pattern -->
  <g fill="#C8CDD6" opacity="0.6">
    <circle cx="20" cy="20" r="4"/><circle cx="60" cy="20" r="4"/><circle cx="100" cy="20" r="4"/><circle cx="140" cy="20" r="4"/><circle cx="180" cy="20" r="4"/><circle cx="220" cy="20" r="4"/><circle cx="260" cy="20" r="4"/><circle cx="300" cy="20" r="4"/><circle cx="340" cy="20" r="4"/><circle cx="380" cy="20" r="4"/>
    <circle cx="20" cy="60" r="4"/><circle cx="60" cy="60" r="4"/><circle cx="380" cy="60" r="4"/>
    <circle cx="20" cy="380" r="4"/><circle cx="360" cy="380" r="4"/><circle cx="380" cy="380" r="4"/>
  </g>
  <!-- Geometric swoosh icon -->
  <g transform="translate(105, 30) scale(0.85)">
    <!-- Upper left bar -->
    <rect x="45" y="50" width="100" height="22" rx="6" fill="#1D3B6E" transform="rotate(-30, 95, 61)"/>
    <!-- Arrow right -->
    <rect x="120" y="50" width="90" height="22" rx="6" fill="#1D3B6E" transform="rotate(-30, 165, 61) translate(10,0)"/>
    <!-- S shape left -->
    <path d="M40,100 Q20,120 50,145 Q80,168 55,195" fill="none" stroke="#1D3B6E" stroke-width="24" stroke-linecap="round"/>
    <!-- W or M right -->
    <path d="M115,95 L135,175 L160,130 L185,175 L205,95" fill="none" stroke="#1D3B6E" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- CONSÓRCIO label -->
  <text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#1D3B6E" letter-spacing="6">CONSÓRCIO</text>
  <!-- CANOPUS label -->
  <text x="200" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#1D3B6E" letter-spacing="2">Canopus</text>
</svg>
