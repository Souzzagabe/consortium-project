<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0D1F2D"/>
      <stop offset="100%" stop-color="#0E1A23"/>
    </linearGradient>
    <linearGradient id="barG" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#006B3C"/>
      <stop offset="50%" stop-color="#00BF6F"/>
      <stop offset="100%" stop-color="#39E680"/>
    </linearGradient>
    <linearGradient id="arrG" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#39E680"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- House / arch silhouette at base -->
  <path d="M6 94 L50 70 L94 94 Z" fill="#0a5f78"/>
  <path d="M16 94 L50 75 L84 94" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.45"/>

  <!-- 4 growing bars (baseline y=88) -->
  <rect x="10" y="68" width="12" height="20" rx="2" fill="url(#barG)"/>
  <rect x="26" y="54" width="12" height="34" rx="2" fill="url(#barG)"/>
  <rect x="42" y="36" width="12" height="52" rx="2" fill="url(#barG)"/>
  <rect x="58" y="14" width="12" height="74" rx="2" fill="url(#barG)"/>

  <!-- Diagonal arrow -->
  <line x1="14" y1="70" x2="70" y2="12" stroke="url(#arrG)" stroke-width="6" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M62 7 L74 10 L71 22" fill="none" stroke="url(#arrG)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
