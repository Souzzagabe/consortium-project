name: Build Check

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      # Deploy é feito automaticamente pelo Vercel via integração com o GitHub.
      # O site utiliza Next.js com API Routes, portanto requer hospedagem server-side (Vercel).
