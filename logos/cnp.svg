<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background white -->
  <rect width="400" height="400" fill="white"/>
  <!-- Navy blue square -->
  <rect x="20" y="60" width="220" height="220" rx="8" fill="#1B2B6B"/>
  <!-- Arrow icon top-left corner -->
  <polyline points="50,90 80,75 90,105" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- CNP text -->
  <text x="130" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="white">CNP</text>
  <!-- Light blue arc -->
  <path d="M200,140 Q310,80 380,160" fill="none" stroke="#4DC6F0" stroke-width="28" stroke-linecap="round"/>
  <!-- Pink vertical bar -->
  <rect x="224" y="200" width="18" height="80" rx="4" fill="#E31B6D"/>
</svg>
