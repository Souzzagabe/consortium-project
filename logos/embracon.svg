<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <rect width="400" height="420" fill="white"/>
  <!-- Red hand / logo mark (stylized) -->
  <g transform="translate(200, 110) scale(1)">
    <!-- Palm -->
    <ellipse cx="0" cy="30" rx="48" ry="38" fill="#CC0000"/>
    <!-- Fingers -->
    <rect x="-42" y="-65" width="20" height="70" rx="10" fill="#CC0000" transform="rotate(-15,-32,-30)"/>
    <rect x="-18" y="-80" width="20" height="80" rx="10" fill="#CC0000"/>
    <rect x="8" y="-75" width="20" height="75" rx="10" fill="#CC0000" transform="rotate(5,18,-37)"/>
    <rect x="34" y="-60" width="20" height="65" rx="10" fill="#CC0000" transform="rotate(12,44,-27)"/>
  </g>
  <!-- "Consórcio" text -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="400" fill="#1A1A1A" letter-spacing="1">Consórcio</text>
  <!-- "Embracon" text -->
  <text x="200" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#1A1A1A" letter-spacing="-1">Embracon</text>
  <!-- Tagline -->
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#888888" letter-spacing="3">PORQUE SONHAR NÃO TEM LIMITES</text>
</svg>
